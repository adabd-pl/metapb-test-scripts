test:
  name: basic-contract-benchmark
  description: "Test benchmark for basic operations with varying load levels."
  workers:
    number: 1
  rounds:
     - label: updatePermissions_30_50
       description: "Warm-up phase to stabilize system performance before main tests."
       txDuration: 30
       rateControl:
         type: fixed-load
         opts:
           transactionLoad: 50
       workload:
         module: updatePermissions.js
         arguments:
           contractId: graph5o1
           graphFile: '/data/generated_graphs/graph_1org_400s-0.1.json'
     - label: updatePermissions_30_100
       description: "Warm-up phase to stabilize system performance before main tests."
       txDuration: 30
       rateControl:
         type: fixed-load
         opts:
           transactionLoad: 100
       workload:
         module: updatePermissions.js
         arguments:
           contractId: graph5o1
           graphFile: '/data/generated_graphs/graph_1org_400s-0.1.json'
     - label: updatePermissions_30_150
       description: "Warm-up phase to stabilize system performance before main tests."
       txDuration: 30
       rateControl:
         type: fixed-load
         opts:
           transactionLoad: 150
       workload:
         module: updatePermissions.js
         arguments:
           contractId: graph5o1
           graphFile: '/data/generated_graphs/graph_1org_400s-0.1.json'
     - label: updatePermissions_30_200
       description: "Warm-up phase to stabilize system performance before main tests."
       txDuration: 30
       rateControl:
         type: fixed-load
         opts:
           transactionLoad: 200
       workload:
