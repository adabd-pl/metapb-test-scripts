test:
  name: basic-contract-benchmark
  description: "Test benchmark for basic operations with varying load levels."
  workers:
    number: 1
  rounds:
     - label: add_Vertices_1
       description: "Warm-up phase to stabilize system performance before main tests."
       txDuration: 10
       rateControl:
         type: fixed-load
         opts:
           transactionLoad: 5
          #  startDelay: 5
       workload:
         module: addVertices.js
         arguments:
           contractId: graph5o10
           graphFile: '/data/generated_graphs/graph_1org_test.json'
